<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Casa Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="loginScreen" class="screen-center">
  <div class="login-card">
    <div class="login-logo">
      <i class="icon">🏠</i>
      <h1>Casa Manager</h1>
      <p>Sistema de gestión de propiedad</p>
    </div>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="loginEmail" placeholder="correo@email.com" />
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" />
    </div>
    <p id="loginError" class="error-msg"></p>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="mainApp" class="hidden">
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
  <div class="mobile-header">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <span style="font-size:15px;font-weight:600;color:var(--cyan)">🏠 Casa Manager</span>
  </div>
  <aside id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🏠</span>
      <span class="logo-text">Casa Manager</span>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebarAvatar">AD</div>
      <div>
        <div class="user-name" id="sidebarName">Admin</div>
        <div class="user-role-badge" id="sidebarRoleBadge">Administrador</div>
      </div>
    </div>
    <nav id="sidebarNav"></nav>
    <button class="btn-logout" onclick="logout()">⬅ Cerrar sesión</button>
  </aside>
  <main id="mainContent">
    <div id="pageContent"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script src="script.js"></script>
</body>
</html>
